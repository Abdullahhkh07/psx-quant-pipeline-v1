name: Daily PSX Data Pipeline

on:
  push:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install pandas pyarrow numpy
          pip install https://github.com/rongardF/tvdatafeed/archive/refs/heads/main.zip
          
      - name: Run the Data Engine!
        run: python pipeline.py

      - name: Save the new Data
        run: |
          git config --global user.name "GitHub Automation Bot"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "🤖 Auto-updated stock data" || exit 0
          git push